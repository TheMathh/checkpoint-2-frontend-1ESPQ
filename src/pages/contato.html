<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">

  <meta name="keywords" content="contato, vinho, vinícola">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contato</title>

</head>

<body>

<header>
  <h1>Vinharia Agnello</h1>

  <nav>
    <ul>
      <li><a href="../../index.html">Home</a></li>
      <li><a href="historia.html">História</a></li>

      <li><a href="contato.html">Contato</a></li>
    </ul>
  </nav>
</header>

<main>

  <section id="contato">
    <h2>Entre em contato</h2>
    <p>Preencha o formulário abaixo para falar conosco.</p>

    <img src="../assets/imgs/vinicola.jpg" alt="Vinícola" class="img-contato">

    <form>
      <label for="nome">Nome:</label><br>
      <input type="text" id="nome" name="nome" required><br><br>

      <label for="email">Email:</label><br>
      <input type="email" id="email" name="email" required><br><br>

      <label for="mensagem">Mensagem:</label><br>
      <textarea id="mensagem" name="mensagem" rows="5" required></textarea><br><br>

      <button type="submit">Enviar</button>
    </form>
  </section>

</main>

<footer>
  <p>&copy; 2026 Vinharia Agnello</p>
</footer>

</body>
</html>
